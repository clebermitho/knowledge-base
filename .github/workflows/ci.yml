name: CI/CD Knowledge Base

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate all JSON files
        run: |
          echo "Validating JSON files..."
          errors=0
          for file in *.json; do
            if [ -f "$file" ]; then
              if node -e "JSON.parse(require('fs').readFileSync('$file','utf8'))" 2>/dev/null; then
                echo "✅ $file"
              else
                echo "❌ $file — Invalid JSON"
                errors=$((errors + 1))
              fi
            fi
          done
          if [ $errors -gt 0 ]; then echo "Found $errors invalid JSON file(s)"; exit 1; fi

      - name: Validate knowledge base structure
        run: |
          node -e "
            const fs = require('fs');
            const base = JSON.parse(fs.readFileSync('base-conhecimento.json', 'utf8'));
            const requiredKeys = [
              'project',
              'behavior',
              'core_rules',
              'intelligence',
              'procedures',
              'response_patterns',
              'objections',
              'contacts',
              'security_rules',
              'fallback',
              'response_model'
            ];
            const missing = requiredKeys.filter(k => !(k in base));
            if (missing.length) {
              console.error('❌ base-conhecimento.json: missing keys:', missing);
              process.exit(1);
            }
            if (!Array.isArray(base.core_rules) || !Array.isArray(base.security_rules)) {
              console.error('❌ base-conhecimento.json: core_rules and security_rules must be arrays');
              process.exit(1);
            }
            if (typeof base.project !== 'object' || typeof base.behavior !== 'object' || typeof base.fallback !== 'object') {
              console.error('❌ base-conhecimento.json: project, behavior and fallback must be objects');
              process.exit(1);
            }
            console.log('✅ base-conhecimento.json: unified contract is valid');
          "

      - name: Check VERSION file
        run: |
          if [ ! -f "VERSION" ]; then echo "❌ VERSION file missing"; exit 1; fi
          echo "✅ VERSION: $(cat VERSION)"
