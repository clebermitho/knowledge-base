name: CI/CD Knowledge Base

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate all JSON files
        run: |
          echo "Validating JSON files..."
          errors=0
          for file in *.json; do
            if [ -f "$file" ]; then
              if node -e "JSON.parse(require('fs').readFileSync('$file','utf8'))" 2>/dev/null; then
                echo "✅ $file"
              else
                echo "❌ $file — Invalid JSON"
                errors=$((errors + 1))
              fi
            fi
          done
          if [ $errors -gt 0 ]; then echo "Found $errors invalid JSON file(s)"; exit 1; fi

      - name: Validate knowledge base structure
        run: |
          node << 'EOF'
          const fs = require('fs');
          const crypto = require('crypto');

          // Validate base_coren.json (schema v1.3.0+)
          const base = JSON.parse(fs.readFileSync('base_coren.json', 'utf8'));
          if (!base.base_conhecimento || !Array.isArray(base.base_conhecimento)) {
            console.error('❌ base_coren.json: missing base_conhecimento array');
            process.exit(1);
          }

          const requiredEntryFields = ['id', 'categoria', 'pergunta', 'resposta', 'palavras_chave', 'metadata'];
          const requiredMetaFields = ['versao', 'hash', 'origem', 'criado_em', 'atualizado_em', 'ativo'];
          let errors = 0;
          const seenIds = new Set();
          const seenHashes = new Set();

          base.base_conhecimento.forEach((entry, i) => {
            const missing = requiredEntryFields.filter(f => entry[f] === undefined);
            if (missing.length) {
              console.error('❌ base_coren.json[' + i + ']: missing fields:', missing.join(', '));
              errors++;
            }
            if (entry.metadata) {
              const missingMeta = requiredMetaFields.filter(f => entry.metadata[f] === undefined);
              if (missingMeta.length) {
                console.error('❌ base_coren.json[' + i + '].metadata: missing fields:', missingMeta.join(', '));
                errors++;
              }
            }
            if (entry.id) {
              if (seenIds.has(entry.id)) {
                console.error('❌ base_coren.json[' + i + ']: duplicate id:', entry.id);
                errors++;
              }
              seenIds.add(entry.id);
            }
            if (entry.metadata && entry.metadata.hash) {
              if (seenHashes.has(entry.metadata.hash)) {
                console.error('❌ base_coren.json[' + i + ']: duplicate hash (possible duplicate entry):', entry.metadata.hash);
                errors++;
              }
              seenHashes.add(entry.metadata.hash);
            }
          });

          if (errors > 0) { process.exit(1); }
          console.log('✅ base_coren.json: ' + base.base_conhecimento.length + ' entries (schema v' + (base.schema_version || 'legacy') + ')');

          // Validate ia_config.json (canonical name) and legacy programação ia.json for backward compatibility
          const iaFile = fs.existsSync('ia_config.json') ? 'ia_config.json' : 'programação ia.json';
          const ia = JSON.parse(fs.readFileSync(iaFile, 'utf8'));
          const requiredKeys = ['project', 'role', 'knowledge_base', 'common_objections', 'response_structure', 'forbidden_behaviors'];
          const missing = requiredKeys.filter(k => !ia[k]);
          if (missing.length) {
            console.error('❌ ' + iaFile + ': missing keys:', missing.join(', '));
            process.exit(1);
          }
          console.log('✅ ' + iaFile + ': all required keys present');
          EOF

      - name: Check VERSION file
        run: |
          if [ ! -f "VERSION" ]; then echo "❌ VERSION file missing"; exit 1; fi
          echo "✅ VERSION: $(cat VERSION)"
